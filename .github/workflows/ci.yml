name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run quality gate (fast)
        run: python scripts/quality_gate.py --mode fast

  diarization-integration:
    if: ${{ vars.RUN_DIARIZATION_INTEGRATION == '1' }}
    runs-on: macos-14
    timeout-minutes: 90
    env:
      PYANNOTE_AUTH_TOKEN: ${{ secrets.PYANNOTE_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,diarize]"

      - name: Validate diarization integration credentials
        run: |
          if [ -z "${PYANNOTE_AUTH_TOKEN}" ]; then
            echo "PYANNOTE_AUTH_TOKEN secret is required when RUN_DIARIZATION_INTEGRATION=1"
            exit 1
          fi

      - name: Run live diarization integration smoke test
        run: RUN_DIARIZATION_LIVE_INTEGRATION=1 python -m pytest -q tests/test_diarization_live_integration.py

  pypi-smoke-core:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: macos-14
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from PyPI (core)
        run: pip install --no-cache-dir mlx-qwen3-asr

      - name: Validate import and CLI
        run: |
          python -c "import mlx_qwen3_asr as m; print(m.__version__)"
          mlx-qwen3-asr --version
          mlx-qwen3-asr --help > /tmp/mlx_qwen3_asr_help.txt
          grep -- '--diarize' /tmp/mlx_qwen3_asr_help.txt

  pypi-smoke-diarize:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: macos-14
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from PyPI ([diarize] extra)
        run: pip install --no-cache-dir "mlx-qwen3-asr[diarize]"

      - name: Validate diarize runtime dependencies
        run: |
          python -c "import pyannote.audio, torch; print('diarize_deps_ok=True')"
          mlx-qwen3-asr --help > /tmp/mlx_qwen3_asr_help.txt
          grep -- '--diarize' /tmp/mlx_qwen3_asr_help.txt
